<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Begin the story</title>
  <link rel="icon" type="image/svg+xml" href="lemonade.svg">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html,
body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
}

video {
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    display: block;
}
</style>
</head>

<body>

<!-- Video must be muted to autoplay -->
<video id="myVideo" controls autoplay muted playsinline width="600">
  <source src="welcome_to_MY_drama.webm" type="video/webm">
</video>

<script>
  // Unmute the video on the first user interaction
  document.body.addEventListener('click', function() {
    var video = document.getElementById('myVideo');
    video.muted = false;
  }, { once: true });

  const video = document.getElementById('myVideo');
const maxLoops = 2; // Set your desired number of loops
let currentLoop = 0;

video.addEventListener('timeupdate', () => {
  // Check if the video has reached the end
  if (video.currentTime >= video.duration) {
    currentLoop++;
    
    // Check if we've hit the loop limit
    if (currentLoop >= maxLoops) {
      video.pause();
      // Remove the listener so it doesn't accidentally trigger again
      // video.removeAttribute('loop'); 
    } else {
      // If not, replay it from the beginning
      video.currentTime = 0;
      video.play();
    }
  }
});

</script>

</body>
</html>
